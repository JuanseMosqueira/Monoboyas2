version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monoboyas-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # La variable de base de datos se toma de tu entorno local o .env
      - DATABASE_URL=${DATABASE_URL}
    restart: always
